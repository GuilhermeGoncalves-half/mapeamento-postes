<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Mapa</title>

    {% load static %}

    <!-- css -->
    <link
        rel="stylesheet"
        href="{% static 'core/css/style.css' %}"
    >

    <!-- leaflet -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

</head>

<body>

    <!-- google maps js -->
    <script 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAfAh0TjggYA2H8tsf-Ygw4IESX-jPPafs&callback=initMap" 
    async defer>
    </script>

    <!-- sidebar -->
    <div id="sidebar">


        <div class="control">
        <h2>Controle</h2>

        <!-- botão criar -->
        <button onclick="ativarModoCriacao()">
            ➕ Adicionar Poste
        </button>

        <!-- botão excluir -->
        <button onclick="ativarModoExclusao()">
            ❌ Excluir Poste
        </button>

        </div>

        <div class="filter">
            <h2>FIltros</h2>

            <h4>Postes</h4>
            <button onclick="">Ativos</button>
            <button onclick="">Manutenção</button>
            <button onclick="">Desativado</button>
        </div>

        <hr>

        <!-- informações -->
        <div id="info">
            Nenhuma ação selecionada
        </div>

    </div>

    <!-- modal criar -->
    <div id="modal" class="modal">

        <div class="modal-content">

            <h2>Novo Poste</h2>

            <!-- latitude -->
            <input
                type="text"
                id="latitude"
                placeholder="Latitude"
            >

            <!-- longitude -->
            <input
                type="text"
                id="longitude"
                placeholder="Longitude"
            >

            <!-- status -->
            <select id="status">

            <option value="">
                Selecione o status
            </option>

            <option value="ativo">
                Ativo
            </option>

            <option value="manutencao">
                Manutenção
            </option>

            <option value="desativado">
                Desativado
            </option>

            </select>

            <select id="tipo">

            <option value="">
                Selecione o tipo
            </option>

            <option value="backbone">
                Backbone
            </option>

            <option value="distribuicao">
                Distribuição
            </option>

            <option value="cto">
                CTO
            </option>

            <option value="atendimento">
                Atendimento
            </option>

            <option value="derivacao">
                Derivação
            </option>

            <option value="passagem">
                Passagem
            </option>

            <option value="reserva">
                Reserva
            </option>

            <option value="emenda">
                Emenda
            </option>

            <option value="splitter">
                Splitter
            </option>

        </select>

            <!-- observação -->
            <textarea
                id="observacao"
                placeholder="Observação"
            ></textarea>

            <div id="sucesso"></div>
            <div id="erro"></div>

            <!-- salvar -->
            <button onclick="salvarPoste()">
                Salvar
            </button>

            <!-- cancelar -->
            <button onclick="fecharModal()">
                Cancelar
            </button>

        </div>

    </div>
    <!-- modal obs da manutenção -->
    <div id="modal-obs" class="modal">

        <div class="modal-content">

            <!-- observação da manutenção -->
            <textarea
                id="observacao-man"
                placeholder="Especifique o motivo de manutenção do poste."
            ></textarea>

            <div id="sucesso"></div>
            <div id="erro"></div>

            <!-- salvar -->
            <button onclick="salvarObs()">
                Salvar
            </button>

            <!-- cancelar -->
            <button onclick="fecharModal()">
                Cancelar
            </button>

        </div>

    </div>

    <!-- modal editar -->
    <div id="modal-edit" class="modal">

        <div class="modal-content">

            <h2>Editar Poste</h2>

            <!-- latitude -->
            <input
                type="text"
                id="latitude-edit"
                placeholder="Latitude"
            >

            <!-- longitude -->
            <input
                type="text"
                id="longitude-edit"
                placeholder="Longitude"
            >

            <!-- status -->
            <select id="status-edit">

            <option value="ativo">
                Ativo
            </option>

            <option value="manutencao">
                Manutenção
            </option>

            <option value="desativado">
                Desativado
            </option>

            </select>

            <select id="tipo-edit">

            <option value="">
                Selecione o tipo
            </option>

            <option value="backbone">
                Backbone
            </option>

            <option value="distribuicao">
                Distribuição
            </option>

            <option value="cto">
                CTO
            </option>

            <option value="atendimento">
                Atendimento
            </option>

            <option value="derivacao">
                Derivação
            </option>

            <option value="passagem">
                Passagem
            </option>

            <option value="reserva">
                Reserva
            </option>

            <option value="emenda">
                Emenda
            </option>

            <option value="splitter">
                Splitter
            </option>

        </select>

            <!-- observação -->
            <textarea
                id="observacao-edit"
                placeholder="Observação"
            ></textarea>

            <!-- salvar -->
            <button onclick="salvarEdicao()">
                Salvar
            </button>

            <!-- cancelar -->
            <button onclick="fecharModal()">
                Cancelar
            </button>

        </div>

    </div>

    <div id="modal-delete" class="modal">
        <div class="modal-content">
        <h2>Deseja realmente apagar este poste?</h2>

        <!-- excluir -->
        <button onclick="excluirPoste()">
            Excluir
        </button>

        <!-- cancelar -->
        <button onclick="fecharModal()">
            Cancelar
        </button>

        </div>
    </div>

    <!-- mapa -->
    <div id="map"></div>

    <!-- js -->
    <script src="{% static 'core/js/script.js' %}"></script>

</body>
</html>
